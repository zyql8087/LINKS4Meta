# src/config_inverse.yaml
# 閫嗗悜 AI 璁捐绯荤粺瓒呭弬鏁伴厤缃?

# 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
# 鏇茬嚎缂栫爜鍣?(CurveEncoder)
# 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
curve_encoder:
  input_dim: 800        # flatten(y_foot(400) + y_knee(200) + y_ankle(200))
  hidden_dims: [512, 256]
  latent_dim: 128

# 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
# GNN Policy 缃戠粶
# 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
gnn_policy:
  node_input_dim: 4     # [x, y, is_fixed, is_grounded]
  edge_input_dim: 1     # 鏉嗛暱
  hidden_dim: 128      # 涓庡疄闄呮垚鍔熸敹鏁涚殑鏈€浼樻潈閲嶇粨鏋?128缁?淇濇寔鍚屾
  num_layers: 4        # 鎭㈠娣卞害
  dropout: 0.1         # 鎭㈠姝ｅ父杞诲害姝ｅ垯鍖?

# 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
# C-VAE 鍑犱綍澶?
# 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
cvae:
  latent_dim: 64        # z_geo 閲囨牱缁村害
  condition_dim: 128    # 鏉′欢鍚戦噺缁村害 (GNN鐗瑰緛 + 鏇茬嚎z_c)
  output_dim: 4         # 涓や釜鏂拌妭鐐瑰潗鏍?(n1.x, n1.y, n2.x, n2.y)
  beta: 1.0             # KL 鏁ｅ害鏉冮噸 (尾-VAE)
  prior_bias_init: 0.10
  prior_bias_max: 0.50

# 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
# IL 棰勮缁?
# 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
il_training:
  batch_size: 4096     # Fix: 灏忓浘闇€瑕佽秴澶?batch 鎵嶈兘鎵撴弧 GPU
  learning_rate: 0.0003
  epochs: 100
  w_topology: 1.0
  w_geometry: 1.0
  w_geometry_prior: 0.75  # encourage the prior path used at inference time
  w_geometry_prior_regularizer: 0.10
  geometry_prior_margin_scale: 1.25
  val_ratio: 0.1
  test_ratio: 0.1
  split_seed: 42
  patience: 20

# 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
# MCTS 鎷撴墤鎼滅储
# 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
mcts:
  num_rollouts: 64     # 16x larger batches feed GPU properly (4→64)
  c_puct: 1.4
  max_depth: 2

# 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
# RL (PPO)
# 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
rl_training:
  episodes: 5000
  steps_per_episode: 1 # Strictly 1 step (to match Surrogate's 6-bar training data bounds)
  learning_rate: 0.0001
  gamma: 0.99
  clip_eps: 0.2
  entropy_coef: 0.01
  geometry_samples_per_topology: 8
  geometry_prior_clearance_scale: 1.0

# 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
# 濂栧姳鍑芥暟鏉冮噸
# 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
reward:
  w_foot: 0.5
  w_knee: 0.25
  w_ankle: 0.25
  foot_mix_chamfer: 0.5
  foot_mix_nrmse: 0.5
  w_smooth: 0.05
  penalty_locking: -100.0

constraints:
  min_link_length: 0.05
  min_node_distance: 0.01
  intersection_eps: 1.0e-8

experiment:
  hard_test_fraction: 0.25
  hard_test_min_samples: 256
  retrieval_weights:
    w_foot: 0.5
    w_knee: 0.25
    w_ankle: 0.25
  eval_report_output: "artifacts/experiment_report.json"
  eval_num_samples: null

# 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
# 鏂囦欢璺緞
# 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
paths:
  pkl_dataset: "f:/LINKS4Meta/LINKS-main/biological_6bar_dataset_80k_with_geninfo.pkl"
  forward_model: "model_bio_best.pt"
  config_forward: "src/config_model_bio.yaml"
  il_dataset_output: "f:/LINKS4Meta/LINKS-main/il_expert_paths_80k.pt"
  il_model_output: "model_inverse_il.pt"
  il_plot_output: "F:/LINKS4Meta/output/reports/il_loss_curve_formal.png"
  il_report_output: "F:/LINKS4Meta/output/reports/il_training_report_formal.json"
  il_split_output: "F:/LINKS4Meta/output/reports/il_split_indices_formal.pt"
  rl_model_output: "model_inverse_rl.pt"
